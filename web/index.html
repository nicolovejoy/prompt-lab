<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111">
  <title>Ground Control</title>
  <style>
    :root {
      --bg: #111;
      --card: #1a1a1a;
      --card-hover: #222;
      --text: #e5e5e5;
      --text-secondary: #777;
      --border: #2a2a2a;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.15);
      --red: #ef4444;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius: 8px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --card: #fff;
        --card-hover: #f5f5f5;
        --text: #111;
        --text-secondary: #666;
        --border: #e5e5e5;
        --accent: #4f46e5;
        --accent-light: #6366f1;
        --accent-dim: rgba(79, 70, 229, 0.1);
        --green: #16a34a;
        --green-dim: rgba(22, 163, 74, 0.1);
        --yellow: #ca8a04;
        --yellow-dim: rgba(202, 138, 4, 0.1);
        --red: #dc2626;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 900px; margin: 0 auto; padding: var(--safe-top) 10% var(--safe-bottom); }

    /* Login */
    .login { max-width: 320px; margin: 120px auto; text-align: center; }
    .login h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
    .login p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
    .login input {
      width: 100%; padding: 10px 14px; margin-bottom: 10px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.9rem; font-family: inherit; text-align: center;
    }
    .login input:focus { outline: none; border-color: var(--accent); }
    .login button {
      width: 100%; padding: 10px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .login button:disabled { opacity: 0.4; }

    /* Header */
    header {
      padding: 16px 0 14px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .header-logo {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px;
      cursor: pointer; color: var(--text); text-decoration: none;
    }
    .header-sep { color: var(--text-secondary); font-size: 1rem; }
    .breadcrumb { font-size: 1rem; color: var(--text-secondary); font-weight: 500; }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { color: var(--accent-light); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-meta {
      font-size: 0.75rem; color: var(--text-secondary); font-family: "SF Mono", ui-monospace, monospace;
    }
    .header-btn {
      font-size: 0.8rem; color: var(--text-secondary); cursor: pointer;
      background: none; border: none; font-family: inherit; padding: 4px 10px;
      border-radius: 4px;
    }
    .header-btn:hover { color: var(--text); background: var(--card); }
    @media (max-width: 600px) {
      .header-meta { display: none; }
    }

    /* Project grid */
    .page-title {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 14px;
    }
    .overview-stats {
      font-size: 1rem; color: var(--text-secondary); margin-bottom: 24px;
    }
    .overview-stats strong { color: var(--text); }
    .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 700px) { .project-grid { grid-template-columns: 1fr; } }
    .project-card {
      background: var(--card); padding: 20px 22px; border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s;
    }
    .project-card:hover { border-color: var(--text-secondary); }
    .project-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .health-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .health-green { background: var(--green); }
    .health-yellow { background: var(--yellow); }
    .health-gray { background: var(--text-secondary); opacity: 0.4; }
    .project-card-name { font-weight: 600; font-size: 1.1rem; flex: 1; letter-spacing: -0.3px; }
    .activity-dots { display: flex; gap: 2px; align-items: center; }
    .activity-dot { width: 6px; height: 14px; border-radius: 2px; }
    .activity-dot-0 { background: var(--border); }
    .activity-dot-1 { background: var(--accent); opacity: 0.3; }
    .activity-dot-2 { background: var(--accent); opacity: 0.6; }
    .activity-dot-3 { background: var(--accent); opacity: 1; }
    .project-card-bullets {
      list-style: none; padding: 0; margin: 0;
    }
    .project-card-bullets li {
      font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;
      padding-left: 12px; position: relative;
    }
    .project-card-bullets li::before {
      content: '·'; position: absolute; left: 0; color: var(--text-secondary);
      font-weight: 700;
    }

    /* Project page */
    .project-header { margin-bottom: 20px; }
    .project-name { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
    .project-stats { font-size: 0.9rem; color: var(--text-secondary); }
    .sub-tabs {
      display: flex; gap: 2px; margin-bottom: 18px;
      background: var(--card); padding: 3px; border-radius: var(--radius);
    }
    .sub-tab {
      padding: 7px 16px; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      background: none; border: none; cursor: pointer; border-radius: 6px; font-family: inherit;
    }
    .sub-tab.active { background: var(--accent); color: white; }
    @media (max-width: 600px) {
      .sub-tabs { overflow-x: auto; flex-wrap: nowrap; }
      .sub-tab { white-space: nowrap; flex-shrink: 0; }
    }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-title { font-size: 0.85rem; font-weight: 600; }
    .card-date { font-size: 0.7rem; color: var(--text-secondary); font-family: "SF Mono", ui-monospace, monospace; }
    .card-body { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 0.68rem; padding: 2px 7px; background: var(--border); color: var(--text-secondary); border-radius: 3px; }
    .count-badges { display: flex; gap: 10px; margin-top: 8px; }
    .count-badge { font-size: 0.68rem; color: var(--text-secondary); }
    .count-badge strong { color: var(--text); }

    /* Status badges */
    .status-badge {
      display: inline-block; padding: 2px 7px; font-size: 0.65rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; border-radius: 3px;
    }
    .status-active { background: var(--green-dim); color: var(--green); }
    .status-completed { background: var(--accent-dim); color: var(--accent-light); }
    .status-stalled { background: var(--yellow-dim); color: var(--yellow); }

    /* Vertical timeline */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 4px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .timeline-date {
      font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      margin: 20px 0 8px; position: relative;
      font-family: "SF Mono", ui-monospace, monospace;
    }
    .timeline-date:first-child { margin-top: 0; }
    .timeline-entry {
      position: relative; font-size: 0.88rem; color: var(--text-secondary);
      line-height: 1.6; padding: 3px 0;
    }
    .timeline-entry::before {
      content: ''; position: absolute; left: -20px; top: 8px;
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    }
    .timeline-entry.rollup::before { background: var(--green); }
    .timeline-rollup-text {
      font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5;
      padding: 6px 0 2px;
    }
    .timeline-rollup-label {
      font-size: 0.65rem; font-weight: 600; color: var(--green);
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* Review cards */
    .review-card { border-left: 3px solid var(--accent); }
    .review-content { max-height: 200px; overflow: hidden; transition: max-height 0.3s; }
    .review-content.expanded { max-height: none; }
    .review-expand {
      font-size: 0.75rem; color: var(--accent-light); background: none;
      border: none; cursor: pointer; margin-top: 6px; padding: 0; font-family: inherit;
    }

    /* Ask modal */
    .ask-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
      display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh;
    }
    .ask-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      width: 90%; max-width: 560px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .ask-modal-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
    .ask-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .ask-input {
      flex: 1; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.85rem; font-family: inherit;
    }
    .ask-input::placeholder { color: var(--text-secondary); }
    .ask-btn {
      padding: 10px 16px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .ask-btn:disabled { opacity: 0.4; }
    .ask-answer {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; font-size: 0.82rem; line-height: 1.6; white-space: pre-wrap;
      max-height: 50vh; overflow-y: auto;
    }
    .ask-examples {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .ask-example {
      font-size: 0.72rem; padding: 4px 10px; background: var(--border);
      color: var(--text-secondary); border: none; border-radius: 4px;
      cursor: pointer; font-family: inherit;
    }
    .ask-example:hover { color: var(--text); }

    /* Misc */
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.85rem; }
    .error { color: var(--red); text-align: center; padding: 20px; font-size: 0.85rem; }
    .empty {
      color: var(--text-secondary); text-align: center; padding: 40px; font-size: 0.85rem;
      border: 1px dashed var(--border); border-radius: var(--radius); margin-bottom: 12px;
    }
    .skeleton {
      background: var(--card); border-radius: var(--radius); animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
    }
    .skeleton-card { height: 80px; margin-bottom: 10px; }
    .skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .skeleton-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.3';
    import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10.19.3/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // ---- Router ----
    function parseHash() {
      const hash = (location.hash || '#/').slice(1);
      const parts = hash.split('/').filter(Boolean);
      if (parts[0] === 'project' && parts[1]) {
        return { view: 'project', project: decodeURIComponent(parts[1]), section: parts[2] || 'timeline' };
      }
      if (parts[0] === 'reviews') return { view: 'reviews' };
      return { view: 'home' };
    }

    function navigate(hash) { location.hash = hash; }

    function useRoute() {
      const [route, setRoute] = useState(parseHash);
      useEffect(() => {
        const onChange = () => setRoute(parseHash());
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      return route;
    }

    // ---- API helpers ----
    async function api(path) {
      const resp = await fetch(path);
      if (resp.status === 401) throw new Error('unauthorized');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    async function apiPost(path, body) {
      const resp = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (resp.status === 401) throw new Error('unauthorized');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const then = new Date(dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00');
      const days = Math.floor((now - then) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 7) return days + 'd ago';
      if (days < 30) return Math.floor(days / 7) + 'w ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    function tryParseJson(str, fallback = []) {
      try { return JSON.parse(str || '[]'); } catch { return fallback; }
    }

    // ---- Login ----
    function Login({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        setLoading(true); setError(null);
        try {
          const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          if (resp.ok) onLogin();
          else setError('Wrong password');
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      return html`
        <div class="container">
          <div class="login">
            <h2>Ground Control</h2>
            <p>Enter password to continue</p>
            <input type="password" placeholder="Password" autofocus
              value=${password} onInput=${e => setPassword(e.target.value)}
              onKeyDown=${e => e.key === 'Enter' && submit()} />
            ${error && html`<p class="error" style="margin-bottom: 10px; padding: 0">${error}</p>`}
            <button onClick=${submit} disabled=${loading || !password}>
              ${loading ? 'Signing in...' : 'Sign in'}
            </button>
          </div>
        </div>
      `;
    }

    // ---- Header ----
    function Header({ route, info, onLogout, onAsk }) {
      const freshness = info?.data_freshness ? timeAgo(info.data_freshness) : null;
      const sha = info?.commit_sha || '';

      return html`
        <header>
          <div class="header-left">
            <a class="header-logo" onClick=${() => navigate('#/')}>Ground Control</a>
            ${route.view === 'project' && html`
              <span class="header-sep">/</span>
              <span class="breadcrumb">${route.project}</span>
            `}
            ${route.view === 'reviews' && html`
              <span class="header-sep">/</span>
              <span class="breadcrumb"><a onClick=${() => navigate('#/')}>Projects</a></span>
              <span class="header-sep">/</span>
              <span class="breadcrumb">Reviews</span>
            `}
          </div>
          <div class="header-right">
            ${freshness && html`<span class="header-meta">synced ${freshness}</span>`}
            ${sha && html`<span class="header-meta">${sha}</span>`}
            <button class="header-btn" onClick=${onAsk} title="Ask (/)">Ask</button>
            <button class="header-btn" onClick=${() => navigate('#/reviews')}>Reviews</button>
            <button class="header-btn" onClick=${onLogout}>Log out</button>
          </div>
        </header>
      `;
    }

    // ---- Skeleton Loaders ----
    function SkeletonGrid() {
      return html`<div class="skeleton-grid">
        ${[1,2,3,4].map(() => html`<div class="skeleton skeleton-card"></div>`)}
      </div>`;
    }

    function SkeletonList() {
      return html`<div>
        ${[1,2,3].map(() => html`<div class="skeleton skeleton-card"></div>`)}
      </div>`;
    }

    // ---- Main App ----
    function App() {
      const [authed, setAuthed] = useState(null);
      const [overview, setOverview] = useState(null);
      const [info, setInfo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [askOpen, setAskOpen] = useState(false);
      const route = useRoute();

      useEffect(() => {
        api('/api/login').then(() => setAuthed(true)).catch(() => setAuthed(false));
      }, []);

      const loadOverview = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const data = await api('/api/overview');
          setOverview(data);
        } catch (e) {
          if (e.message === 'unauthorized') { setAuthed(false); return; }
          setError(e.message);
        }
        setLoading(false);
      }, []);

      useEffect(() => {
        if (authed) {
          loadOverview();
          api('/api/info').then(setInfo).catch(() => {});
        }
      }, [authed]);

      // Keyboard shortcut: / to open Ask
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault();
            setAskOpen(true);
          }
          if (e.key === 'Escape') setAskOpen(false);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const logout = async () => {
        await fetch('/api/login', { method: 'DELETE' });
        setAuthed(false); setOverview(null);
      };

      if (authed === null) return html`<div class="loading">Loading...</div>`;
      if (!authed) return html`<${Login} onLogin=${() => setAuthed(true)} />`;

      return html`
        <div class="container">
          <${Header} route=${route} info=${info} onLogout=${logout}
            onAsk=${() => setAskOpen(true)} />

          ${loading && !overview && html`<${SkeletonGrid} />`}
          ${error && html`
            <div class="error">
              <p>${error}</p>
              <button onClick=${loadOverview} style="margin-top: 10px; padding: 6px 14px;
                background: var(--accent); color: white; border: none; border-radius: var(--radius);
                cursor: pointer; font-size: 0.85rem;">Retry</button>
            </div>
          `}

          ${overview && route.view === 'home' && html`
            <${ProjectGrid} overview=${overview} />
          `}
          ${overview && route.view === 'project' && html`
            <${ProjectPage} name=${route.project} section=${route.section} overview=${overview} />
          `}
          ${overview && route.view === 'reviews' && html`
            <${ReviewsPage} />
          `}

          ${askOpen && html`<${AskModal} overview=${overview} onClose=${() => setAskOpen(false)} />`}
        </div>
      `;
    }

    // ---- Activity Dots (GitHub-style heat colors) ----
    function ActivityDots({ activity }) {
      // activity = [{date, prompts}, ...] from last 30 days
      const byDate = {};
      for (const a of activity) byDate[a.date] = a.prompts;

      const today = new Date();
      const dots = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const ds = d.toISOString().slice(0, 10);
        const count = byDate[ds] || 0;
        // 4 levels: 0=none, 1=light(1-5), 2=medium(6-15), 3=dark(16+)
        const level = count === 0 ? 0 : count <= 5 ? 1 : count <= 15 ? 2 : 3;
        dots.push(level);
      }
      return html`
        <div class="activity-dots" title="Last 14 days">
          ${dots.map(lv => html`<div class="activity-dot activity-dot-${lv}"></div>`)}
        </div>
      `;
    }

    // ---- Distill key decisions into short bullets ----
    function distillBullets(summaries, max = 3) {
      const bullets = [];
      for (const s of summaries) {
        const decisions = tryParseJson(s.key_decisions);
        for (const d of decisions) {
          // Truncate each to ~6 words
          const words = d.split(' ');
          const short = words.slice(0, 6).join(' ') + (words.length > 6 ? '...' : '');
          if (!bullets.includes(short) && bullets.length < max) bullets.push(short);
        }
        if (bullets.length >= max) break;
      }
      // Fallback: if no key decisions, use first words of summary
      if (bullets.length === 0 && summaries.length > 0 && summaries[0].summary) {
        const words = summaries[0].summary.split(' ');
        bullets.push(words.slice(0, 6).join(' ') + (words.length > 6 ? '...' : ''));
      }
      return bullets;
    }

    // ---- Project Grid (Home) ----
    function ProjectGrid({ overview }) {
      const { week, by_project, activity_by_project } = overview;

      const activeProjects = Object.keys(by_project)
        .filter(p => by_project[p]?.summaries?.length > 0)
        .sort((a, b) => {
          const da = by_project[a]?.summaries?.[0]?.date || '';
          const db = by_project[b]?.summaries?.[0]?.date || '';
          return db.localeCompare(da);
        });

      return html`
        <div class="overview-stats">
          <strong>${week.sessions}</strong> sessions · <strong>${week.prompts}</strong> prompts · <strong>${week.commits}</strong> commits this week
        </div>

        ${activeProjects.length === 0 && html`
          <div class="empty">No project activity in the last 7 days.</div>
        `}

        <div class="project-grid">
          ${activeProjects.map(p => {
            const data = by_project[p] || { summaries: [], days: 0 };
            const latest = data.summaries[0];
            const activity = activity_by_project?.[p] || [];
            const lastDate = latest?.date;
            const daysAgo = lastDate
              ? Math.floor((new Date() - new Date(lastDate + 'T00:00:00')) / 86400000)
              : 999;
            const healthClass = daysAgo <= 1 ? 'health-green' : daysAgo <= 7 ? 'health-yellow' : 'health-gray';
            const bullets = distillBullets(data.summaries);

            return html`
              <div class="project-card" onClick=${() => navigate('#/project/' + encodeURIComponent(p))}>
                <div class="project-card-top">
                  <div class="health-dot ${healthClass}"></div>
                  <span class="project-card-name">${p}</span>
                  <${ActivityDots} activity=${activity} />
                </div>
                ${bullets.length > 0 && html`
                  <ul class="project-card-bullets">
                    ${bullets.map(b => html`<li>${b}</li>`)}
                  </ul>
                `}
              </div>
            `;
          })}
        </div>

        ${overview.all_projects?.length > activeProjects.length && html`
          <div style="text-align: center; margin-bottom: 20px">
            <span style="font-size: 0.85rem; color: var(--text-secondary)">
              ${overview.all_projects.length - activeProjects.length} dormant project${overview.all_projects.length - activeProjects.length > 1 ? 's' : ''} hidden
            </span>
          </div>
        `}
      `;
    }

    // ---- Project Page ----
    function ProjectPage({ name, section, overview }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true); setData(null);
        api('/api/project?name=' + encodeURIComponent(name))
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setData({ error: e.message }); setLoading(false); });
      }, [name]);

      const tabs = [
        { id: 'timeline', label: 'Timeline' },
        { id: 'intentions', label: 'Intentions' },
        { id: 'rollups', label: 'Rollups' },
      ];

      return html`
        <div>
          <div class="project-header">
            <div class="project-name">${name}</div>
            ${data?.snapshot && html`
              <div class="project-stats">
                ${data.snapshot.session_count_7d || 0} sessions ·
                ${data.snapshot.commit_count_7d || 0} commits (7d)
              </div>
            `}
          </div>

          <div class="sub-tabs">
            ${tabs.map(t => html`
              <button class="sub-tab ${section === t.id ? 'active' : ''}"
                onClick=${() => navigate('#/project/' + encodeURIComponent(name) + '/' + t.id)}>
                ${t.label}
              </button>
            `)}
          </div>

          ${loading && html`<${SkeletonList} />`}
          ${data?.error && html`<div class="error">${data.error}</div>`}

          ${data && !data.error && section === 'timeline' && html`
            <${TimelineView} data=${data} />
          `}
          ${data && !data.error && section === 'intentions' && html`
            <${IntentionsView} intentions=${data.intentions} />
          `}
          ${data && !data.error && section === 'rollups' && html`
            <${RollupsView} rollups=${data.rollups} />
          `}
        </div>
      `;
    }

    // ---- Timeline View (vertical line with dates and short entries) ----
    function TimelineView({ data }) {
      const { summaries, rollups } = data;

      // Build timeline items sorted by date desc
      const items = [];
      for (const s of summaries) {
        const decisions = tryParseJson(s.key_decisions);
        // Use first key decision as the short phrase, fallback to summary truncated
        const phrase = decisions.length > 0
          ? decisions[0]
          : (s.summary || '').split(' ').slice(0, 12).join(' ') + ((s.summary || '').split(' ').length > 12 ? '...' : '');
        items.push({ type: 'summary', date: s.date, phrase, decisions: decisions.slice(1), data: s });
      }
      for (const r of rollups) {
        items.push({ type: 'rollup', date: r.week_start, data: r });
      }
      items.sort((a, b) => b.date.localeCompare(a.date));

      if (items.length === 0) return html`<div class="empty">No activity recorded yet.</div>`;

      // Group by date
      const groups = [];
      let currentDate = null;
      for (const item of items) {
        if (item.date !== currentDate) {
          currentDate = item.date;
          groups.push({ date: currentDate, items: [] });
        }
        groups[groups.length - 1].items.push(item);
      }

      return html`
        <div class="timeline">
          ${groups.map(g => html`
            <div class="timeline-date">${g.date}</div>
            ${g.items.map(item => {
              if (item.type === 'summary') {
                return html`
                  <div class="timeline-entry">
                    ${item.phrase}
                    ${item.decisions.length > 0 && item.decisions.map(d => html`
                      <div class="timeline-entry" style="opacity: 0.7; padding-left: 4px">${d}</div>
                    `)}
                  </div>
                `;
              }
              if (item.type === 'rollup') {
                const r = item.data;
                const highlights = tryParseJson(r.highlights);
                return html`
                  <div class="timeline-entry rollup">
                    <span class="timeline-rollup-label">Weekly rollup</span>
                    <div class="timeline-rollup-text">${r.narrative}</div>
                    ${highlights.length > 0 && html`
                      <div class="card-tags" style="margin-top: 4px">
                        ${highlights.map(h => html`<span class="tag">${h}</span>`)}
                      </div>
                    `}
                  </div>
                `;
              }
            })}
          `)}
        </div>
      `;
    }

    // ---- Intentions View ----
    function IntentionsView({ intentions }) {
      if (!intentions?.length) return html`<div class="empty">No intentions tracked for this project.</div>`;

      const active = intentions.filter(i => i.status === 'active');
      const other = intentions.filter(i => i.status !== 'active');

      return html`
        ${active.length > 0 && html`
          <div class="page-title">Active</div>
          ${active.map(i => html`
            <div class="card">
              <div class="card-header">
                <span class="card-body" style="margin: 0">${i.intention}</span>
                <span class="status-badge status-active">active</span>
              </div>
              <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px">
                since ${i.first_seen}${i.last_seen !== i.first_seen ? ' · updated ' + i.last_seen : ''}
              </div>
            </div>
          `)}
        `}
        ${other.length > 0 && html`
          <div class="page-title" style="margin-top: 16px">Resolved</div>
          ${other.map(i => html`
            <div class="card" style="opacity: 0.7">
              <div class="card-header">
                <span class="card-body" style="margin: 0">${i.intention}</span>
                <span class="status-badge status-${i.status}">${i.status}</span>
              </div>
              <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px">
                ${i.first_seen} — ${i.last_seen}
              </div>
            </div>
          `)}
        `}
      `;
    }

    // ---- Rollups View ----
    function RollupsView({ rollups }) {
      if (!rollups?.length) return html`<div class="empty">No weekly rollups yet.</div>`;

      return html`
        ${rollups.map(r => {
          const highlights = tryParseJson(r.highlights);
          return html`
            <div class="card">
              <div class="card-header">
                <span class="card-title">Week of ${r.week_start}</span>
              </div>
              <div class="card-body">${r.narrative}</div>
              ${highlights.length > 0 && html`
                <div class="card-tags">
                  ${highlights.map(h => html`<span class="tag">${h}</span>`)}
                </div>
              `}
              <div class="count-badges">
                <span class="count-badge"><strong>${r.prompt_count || 0}</strong> prompts</span>
                <span class="count-badge"><strong>${r.session_count || 0}</strong> sessions</span>
                <span class="count-badge"><strong>${r.commit_count || 0}</strong> commits</span>
              </div>
            </div>
          `;
        })}
      `;
    }

    // ---- Reviews Page ----
    function ReviewsPage() {
      const [reviews, setReviews] = useState(null);
      const [loading, setLoading] = useState(true);
      const [expanded, setExpanded] = useState({});

      useEffect(() => {
        api('/api/reviews').then(d => { setReviews(d.reviews); setLoading(false); });
      }, []);

      if (loading) return html`<${SkeletonList} />`;
      if (!reviews?.length) return html`<div class="empty">No reviews yet.</div>`;

      const toggle = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));

      return html`
        <div class="page-title">Reviews</div>
        ${reviews.map(r => html`
          <div class="card review-card">
            <div class="card-header">
              <span class="card-title">${r.subject || r.review_type}</span>
              <span class="card-date">${r.date}</span>
            </div>
            <div class="review-content ${expanded[r.id] ? 'expanded' : ''}">
              <div class="card-body" style="white-space: pre-wrap">
                ${r.content_text || r.content_markdown || '(no content)'}
              </div>
            </div>
            <button class="review-expand" onClick=${() => toggle(r.id)}>
              ${expanded[r.id] ? 'Show less' : 'Show more'}
            </button>
          </div>
        `)}
      `;
    }

    // ---- Ask Modal ----
    function AskModal({ overview, onClose }) {
      const [question, setQuestion] = useState('');
      const [answer, setAnswer] = useState(null);
      const [asking, setAsking] = useState(false);
      const [error, setError] = useState(null);
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const handleAsk = async () => {
        if (!question.trim()) return;
        setAsking(true); setError(null); setAnswer(null);

        const bp = overview.by_project || {};
        const ip = overview.intentions_by_project || {};
        const allSummaries = [];
        const allIntentions = [];

        for (const [p, data] of Object.entries(bp)) {
          for (const s of data.summaries || [])
            allSummaries.push('[' + s.date + '] ' + p + ': ' + s.summary);
        }
        for (const [p, items] of Object.entries(ip)) {
          for (const i of items)
            allIntentions.push('[' + p + '] ' + i.intention + ' (' + i.status + ', since ' + i.first_seen + ')');
        }

        const ctx = [
          '== Daily summaries (last 7 days) ==',
          ...allSummaries.slice(0, 30), '',
          '== Active intentions ==',
          ...allIntentions,
        ].join('\n');

        try {
          const result = await apiPost('/api/ask', { question: question.trim(), context: ctx });
          if (result.error) throw new Error(result.error);
          setAnswer(result.answer);
        } catch (e) { setError(e.message); }
        setAsking(false);
      };

      const setQ = (q) => { setQuestion(q); setTimeout(() => inputRef.current?.focus(), 0); };

      const examples = [
        'What did I work on this week?',
        'Which project needs attention?',
        'Summarize my active intentions',
      ];

      return html`
        <div class="ask-overlay" onClick=${(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div class="ask-modal">
            <div class="ask-modal-title">Ask about your work</div>
            ${!answer && !asking && html`
              <div class="ask-examples">
                ${examples.map(q => html`
                  <button class="ask-example" onClick=${() => setQ(q)}>${q}</button>
                `)}
              </div>
            `}
            <div class="ask-input-row">
              <input class="ask-input" ref=${inputRef} type="text"
                placeholder="Ask anything..."
                value=${question} onInput=${e => setQuestion(e.target.value)}
                onKeyDown=${e => { if (e.key === 'Enter') handleAsk(); if (e.key === 'Escape') onClose(); }}
                disabled=${asking} />
              <button class="ask-btn" onClick=${handleAsk} disabled=${asking || !question.trim()}>
                ${asking ? '...' : 'Ask'}
              </button>
            </div>
            ${error && html`<div class="error" style="padding: 8px">${error}</div>`}
            ${answer && html`<div class="ask-answer">${answer}</div>`}
          </div>
        </div>
      `;
    }

    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
