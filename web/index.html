<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111">
  <title>Prompt Lab</title>
  <script defer src="/beacon.js"></script>
  <style>
    :root {
      --bg: #111;
      --card: #1a1a1a;
      --card-hover: #222;
      --text: #e5e5e5;
      --text-secondary: #777;
      --border: #2a2a2a;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --yellow: #eab308;
      --yellow-dim: rgba(234, 179, 8, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius: 8px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --card: #fff;
        --card-hover: #f5f5f5;
        --text: #111;
        --text-secondary: #666;
        --border: #e5e5e5;
        --accent: #4f46e5;
        --accent-light: #6366f1;
        --accent-dim: rgba(79, 70, 229, 0.1);
        --green: #16a34a;
        --green-dim: rgba(22, 163, 74, 0.1);
        --yellow: #ca8a04;
        --yellow-dim: rgba(202, 138, 4, 0.1);
        --red: #dc2626;
        --red-dim: rgba(220, 38, 38, 0.1);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: var(--safe-top) 24px var(--safe-bottom); }

    /* Login */
    .login { max-width: 320px; margin: 120px auto; text-align: center; }
    .login h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
    .login p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
    .login input {
      width: 100%; padding: 10px 14px; margin-bottom: 10px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 0.9rem; font-family: inherit; text-align: center;
    }
    .login input:focus { outline: none; border-color: var(--accent); }
    .login button {
      width: 100%; padding: 10px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .login button:disabled { opacity: 0.4; }

    /* Header */
    header {
      padding: 16px 0 14px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .header-logo {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px;
      cursor: pointer; color: var(--text); text-decoration: none;
    }
    .header-sep { color: var(--text-secondary); font-size: 1rem; }
    .breadcrumb { font-size: 1rem; color: var(--text-secondary); font-weight: 500; }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { color: var(--accent-light); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-meta {
      font-size: 0.75rem; color: var(--text-secondary); font-family: "SF Mono", ui-monospace, monospace;
    }
    .header-btn {
      font-size: 0.8rem; color: var(--text-secondary); cursor: pointer;
      background: none; border: none; font-family: inherit; padding: 4px 10px;
      border-radius: 4px;
    }
    .header-btn:hover { color: var(--text); background: var(--card); }
    .header-btn.active { color: var(--text); background: var(--card); }
    @media (max-width: 600px) {
      .header-meta { display: none; }
    }
    .header-meta.refreshing {
      display: inline-block; animation: spin 0.9s linear infinite; opacity: 0.7;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Project picker (top-nav) */
    .picker { position: relative; display: inline-flex; }
    .picker-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none; font-family: inherit; font-size: 1rem;
      font-weight: 500; color: var(--text-secondary); cursor: pointer; padding: 0;
    }
    .picker-btn:hover { color: var(--accent-light); }
    .picker-caret { font-size: 0.65rem; opacity: 0.7; }
    .picker-menu {
      position: absolute; top: 100%; left: 0; margin-top: 8px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      min-width: 200px; max-height: 60vh; overflow-y: auto; padding: 4px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 50;
    }
    .picker-section {
      font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); padding: 8px 10px 3px;
    }
    .picker-item {
      display: block; width: 100%; text-align: left; padding: 7px 10px;
      font-size: 0.85rem; color: var(--text); background: none; border: none;
      cursor: pointer; border-radius: 5px; font-family: inherit;
    }
    .picker-item:hover { background: var(--card-hover); }
    .picker-item.active { color: var(--accent-light); font-weight: 600; }

    /* Cost placeholder (loading / no-spend states) */
    .cost-placeholder {
      margin-top: 16px; padding: 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5;
    }

    .overview-stats {
      font-size: 1rem; color: var(--text-secondary); margin-bottom: 24px;
    }
    .overview-stats strong { color: var(--text); }

    /* Project page */
    .project-header { margin-bottom: 24px; }
    .project-title-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
    .project-name { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.3px; }
    .project-links { display: flex; gap: 8px; align-items: center; }
    .project-link {
      font-size: 0.72rem; color: var(--text-secondary); text-decoration: none;
      padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-family: "SF Mono", ui-monospace, monospace; transition: border-color 0.15s;
    }
    .project-link:hover { border-color: var(--text-secondary); color: var(--text); }
    .project-meta {
      font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px;
      font-family: "SF Mono", ui-monospace, monospace;
    }
    .project-summary { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .project-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
    @media (max-width: 800px) { .project-layout { grid-template-columns: 1fr; } }
    .project-sidebar > * + * { margin-top: 16px; }
    .sidebar-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .sidebar-label {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 8px;
    }

    /* Activity heatmap */
    .heatmap { display: flex; gap: 2px; flex-wrap: nowrap; margin-bottom: 16px; overflow-x: auto; }
    .heatmap-month { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .heatmap-cell { width: 8px; height: 8px; border-radius: 2px; }
    .heatmap-cell-0 { background: var(--border); }
    .heatmap-cell-1 { background: var(--accent); opacity: 0.25; }
    .heatmap-cell-2 { background: var(--accent); opacity: 0.5; }
    .heatmap-cell-3 { background: var(--accent); opacity: 0.75; }
    .heatmap-cell-4 { background: var(--accent); opacity: 1; }
    .heatmap-labels {
      display: flex; justify-content: space-between;
      font-size: 0.6rem; color: var(--text-secondary);
      font-family: "SF Mono", ui-monospace, monospace; margin-bottom: 4px;
    }

    .sub-tabs {
      display: flex; gap: 2px; margin-bottom: 18px;
      background: var(--card); padding: 3px; border-radius: var(--radius);
    }
    .sub-tab {
      padding: 7px 16px; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      background: none; border: none; cursor: pointer; border-radius: 6px; font-family: inherit;
    }
    .sub-tab.active { background: var(--accent); color: white; }
    @media (max-width: 600px) {
      .sub-tabs { overflow-x: auto; flex-wrap: nowrap; }
      .sub-tab { white-space: nowrap; flex-shrink: 0; }
    }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-title { font-size: 0.85rem; font-weight: 600; }
    .card-date { font-size: 0.7rem; color: var(--text-secondary); font-family: "SF Mono", ui-monospace, monospace; }
    .card-body { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 0.68rem; padding: 2px 7px; background: var(--border); color: var(--text-secondary); border-radius: 3px; }
    .count-badges { display: flex; gap: 10px; margin-top: 8px; }
    .count-badge { font-size: 0.68rem; color: var(--text-secondary); }
    .count-badge strong { color: var(--text); }

    /* Status badges */
    .status-badge {
      display: inline-block; padding: 2px 7px; font-size: 0.65rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; border-radius: 3px;
    }
    .status-active { background: var(--green-dim); color: var(--green); }
    .status-completed { background: var(--accent-dim); color: var(--accent-light); }
    .status-stalled { background: var(--yellow-dim); color: var(--yellow); }

    /* Vertical timeline */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 4px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .timeline-date {
      font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      margin: 20px 0 8px; position: relative;
      font-family: "SF Mono", ui-monospace, monospace;
    }
    .timeline-date:first-child { margin-top: 0; }
    .timeline-entry {
      position: relative; font-size: 0.88rem; color: var(--text-secondary);
      line-height: 1.6; padding: 6px 0; cursor: pointer;
      border-radius: 6px; transition: background 0.15s;
    }
    .timeline-entry:hover { background: var(--card); margin: 0 -8px; padding: 6px 8px; }
    .timeline-entry::before {
      content: ''; position: absolute; left: -20px; top: 12px;
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    }
    .timeline-entry:hover::before { left: -12px; }
    .timeline-entry.rollup { cursor: default; }
    .timeline-entry.rollup:hover { background: none; margin: 0; padding: 6px 0; }
    .timeline-entry.rollup::before { background: var(--green); }
    .timeline-entry.rollup:hover::before { left: -20px; }
    .timeline-phrase { font-size: 0.88rem; }
    .timeline-expand {
      margin-top: 8px; padding: 10px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .timeline-expand-summary {
      font-size: 0.82rem; color: var(--text); line-height: 1.6; margin-bottom: 8px;
    }
    .timeline-expand-decisions {
      list-style: none; padding: 0; margin: 0 0 8px;
    }
    .timeline-expand-decisions li {
      font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5;
      padding: 2px 0 2px 12px; position: relative;
    }
    .timeline-expand-decisions li::before {
      content: '·'; position: absolute; left: 0; font-weight: 700;
    }
    .timeline-expand-counts {
      display: flex; gap: 12px; font-size: 0.7rem; color: var(--text-secondary);
      font-family: "SF Mono", ui-monospace, monospace;
    }
    .timeline-expand-counts strong { color: var(--text); }
    .timeline-rollup-text {
      font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55;
      padding: 6px 0 2px;
    }
    .timeline-rollup-label {
      font-size: 0.65rem; font-weight: 600; color: var(--green);
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* Review cards */
    .review-card { border-left: 3px solid var(--accent); }
    .review-content { max-height: 200px; overflow: hidden; transition: max-height 0.3s; }
    .review-content.expanded { max-height: none; }
    .review-expand {
      font-size: 0.75rem; color: var(--accent-light); background: none;
      border: none; cursor: pointer; margin-top: 6px; padding: 0; font-family: inherit;
    }

    /* Ask modal */
    .ask-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
      display: flex; align-items: flex-start; justify-content: center; padding-top: 15vh;
    }
    .ask-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      width: 90%; max-width: 560px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .ask-modal-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
    .ask-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .ask-input {
      flex: 1; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 0.85rem; font-family: inherit;
    }
    .ask-input::placeholder { color: var(--text-secondary); }
    .ask-btn {
      padding: 10px 16px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .ask-btn:disabled { opacity: 0.4; }
    .ask-answer {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; font-size: 0.82rem; line-height: 1.6; white-space: pre-wrap;
      max-height: 50vh; overflow-y: auto;
    }
    .ask-examples {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .ask-example {
      font-size: 0.72rem; padding: 4px 10px; background: var(--border);
      color: var(--text-secondary); border: none; border-radius: 4px;
      cursor: pointer; font-family: inherit;
    }
    .ask-example:hover { color: var(--text); }

    /* Machine-voice marker (AI-authored text — tenet #1) */
    .machine { font-style: italic; color: var(--text-secondary); }
    .machine-mark {
      display: inline-block; margin-left: 8px;
      font-style: normal; font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6;
      font-family: "SF Mono", ui-monospace, monospace; white-space: nowrap;
    }

    /* Section labels (project page Now/Trajectory/Cost/History) */
    .section-label {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-secondary);
      margin: 28px 0 12px;
    }
    .section-label:first-child { margin-top: 0; }

    /* Stream (home cross-project feed) */
    .stream-project {
      font-weight: 600; color: var(--text); cursor: pointer; text-decoration: none;
    }
    .stream-project:hover { color: var(--accent-light); }
    .dormant-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .dormant-chip {
      font-size: 0.8rem; color: var(--text-secondary); cursor: pointer;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    }
    .dormant-chip:hover { border-color: var(--text-secondary); color: var(--text); }

    /* Misc */
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.85rem; }
    .error { color: var(--red); text-align: center; padding: 20px; font-size: 0.85rem; }
    .empty {
      color: var(--text-secondary); text-align: center; padding: 40px; font-size: 0.85rem;
      border: 1px dashed var(--border); border-radius: var(--radius); margin-bottom: 12px;
    }
    .skeleton {
      background: var(--card); border-radius: var(--radius); animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
    }
    .skeleton-card { height: 80px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.19.3';
    import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10.19.3/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    const html = htm.bind(h);

    // ---- Router ----
    function parseHash() {
      const hash = (location.hash || '#/').slice(1);
      const parts = hash.split('/').filter(Boolean);
      if (parts[0] === 'project' && parts[1]) {
        return { view: 'project', project: decodeURIComponent(parts[1]), section: parts[2] || 'timeline' };
      }
      if (parts[0] === 'costs') return { view: 'costs' };
      if (parts[0] === 'visitors') return { view: 'visitors' };
      if (parts[0] === 'todos') return { view: 'todos' };
      return { view: 'home' };
    }

    function navigate(hash) { location.hash = hash; }

    function useRoute() {
      const [route, setRoute] = useState(parseHash);
      useEffect(() => {
        const onChange = () => setRoute(parseHash());
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      return route;
    }

    // ---- API helpers ----
    // Retry once on a transient failure (network blip or 5xx cold-start from
    // the serverless/Turso layer) so an occasional load error self-heals
    // instead of forcing the user to reload. 401 never retries.
    async function api(path, retries = 1) {
      for (let attempt = 0; ; attempt++) {
        try {
          const resp = await fetch(path);
          if (resp.status === 401) throw new Error('unauthorized');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return await resp.json();
        } catch (e) {
          if (e.message === 'unauthorized' || attempt >= retries) throw e;
          await new Promise(r => setTimeout(r, 400 * (attempt + 1)));
        }
      }
    }

    async function apiPost(path, body) {
      const resp = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (resp.status === 401) throw new Error('unauthorized');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    // ---- Client cache ----------------------------------------------------
    // Two layers, both stale-while-revalidate (show last-seen instantly, then
    // refetch in the background and swap in fresh data):
    //   • memo — in-session Maps, so back-nav between projects is instant.
    //   • localStorage — survives reload, so a cold load paints from the last
    //     visit's data while the network request is still in flight.
    const memo = { project: new Map(), cost: new Map() };
    function lsGet(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } }
    function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch { /* quota — skip */ } }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const then = new Date(dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00');
      const days = Math.floor((now - then) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return 'yesterday';
      if (days < 7) return days + 'd ago';
      if (days < 30) return Math.floor(days / 7) + 'w ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    function tryParseJson(str, fallback = []) {
      try { return JSON.parse(str || '[]'); } catch { return fallback; }
    }

    // ---- Machine-voice marker (wraps AI-authored text — tenet #1) ----
    function MachineText({ children, mark = true }) {
      return html`<span class="machine">${children}${mark && html`<span class="machine-mark">↳ from claude</span>`}</span>`;
    }

    // ---- Login ----
    function Login({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        setLoading(true); setError(null);
        try {
          const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          if (resp.ok) { const d = await resp.json(); onLogin(d.role); }
          else setError('Wrong password');
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      return html`
        <div class="container">
          <div class="login">
            <h2>Prompt Lab</h2>
            <p>Enter password to continue</p>
            <input type="password" placeholder="Password" autofocus
              value=${password} onInput=${e => setPassword(e.target.value)}
              onKeyDown=${e => e.key === 'Enter' && submit()} />
            ${error && html`<p class="error" style="margin-bottom: 10px; padding: 0">${error}</p>`}
            <button onClick=${submit} disabled=${loading || !password}>
              ${loading ? 'Signing in...' : 'Sign in'}
            </button>
          </div>
        </div>
      `;
    }

    // ---- Project Picker (top-nav, Vercel-style) ----
    function ProjectPicker({ current, active, dormant }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('click', onDoc);
        return () => document.removeEventListener('click', onDoc);
      }, []);
      const go = (p) => { setOpen(false); navigate('#/project/' + encodeURIComponent(p)); };
      const item = (p) => html`
        <button class="picker-item ${p === current ? 'active' : ''}" onClick=${() => go(p)}>${p}</button>`;
      return html`
        <span class="picker" ref=${ref}>
          <button class="picker-btn" onClick=${() => setOpen(o => !o)}>
            ${current}<span class="picker-caret">▾</span>
          </button>
          ${open && html`
            <div class="picker-menu">
              ${active.length > 0 && html`<div class="picker-section">Active</div>`}
              ${active.map(item)}
              ${dormant.length > 0 && html`<div class="picker-section">Dormant</div>`}
              ${dormant.map(item)}
            </div>
          `}
        </span>
      `;
    }

    // ---- Header ----
    function Header({ route, info, role, onLogout, onAsk, active, dormant, refreshing }) {
      const freshness = info?.data_freshness ? timeAgo(info.data_freshness) : null;
      // build_time arrives as ISO 8601 UTC; show it in Pacific time
      // (PDT/PST handled automatically by the Intl API).
      let buildTime = '';
      if (info?.build_time) {
        try {
          const d = new Date(info.build_time);
          buildTime = new Intl.DateTimeFormat('en-US', {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit',
            hour12: false,
            timeZone: 'America/Los_Angeles',
            timeZoneName: 'short',
          }).format(d);
        } catch { buildTime = info.build_time; }
      }

      return html`
        <header>
          <div class="header-left">
            <a class="header-logo" onClick=${() => navigate('#/')}>Prompt Lab</a>
            ${route.view === 'project' && html`
              <span class="header-sep">/</span>
              <${ProjectPicker} current=${route.project} active=${active} dormant=${dormant} />
            `}
          </div>
          <div class="header-right">
            ${refreshing && html`<span class="header-meta refreshing" title="Refreshing…">↻</span>`}
            ${buildTime && html`<span class="header-meta">built ${buildTime}</span>`}
            ${freshness && html`<span class="header-meta">synced ${freshness}</span>`}
            <button class="header-btn ${route.view === 'todos' ? 'active' : ''}" onClick=${() => navigate('#/todos')}>Todos</button>
            <button class="header-btn ${route.view === 'costs' ? 'active' : ''}" onClick=${() => navigate('#/costs')}>Costs</button>
            <button class="header-btn ${route.view === 'visitors' ? 'active' : ''}" onClick=${() => navigate('#/visitors')}>Visitors</button>
            ${onAsk && html`<button class="header-btn" onClick=${onAsk} title="Ask (/)">Ask</button>`}
            <button class="header-btn" onClick=${onLogout}>Log out</button>
          </div>
        </header>
      `;
    }

    // ---- Skeleton Loaders ----
    function SkeletonList() {
      return html`<div>
        ${[1,2,3].map(() => html`<div class="skeleton skeleton-card"></div>`)}
      </div>`;
    }

    // ---- Main App ----
    function App() {
      const [authed, setAuthed] = useState(null);
      const [role, setRole] = useState(null);
      const [overview, setOverview] = useState(null);
      const [info, setInfo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [error, setError] = useState(null);
      const [askOpen, setAskOpen] = useState(false);
      const route = useRoute();

      useEffect(() => {
        api('/api/login').then(d => { setAuthed(true); setRole(d.role || 'admin'); }).catch(() => setAuthed(false));
      }, []);

      // Stale-while-revalidate: paint the cached overview immediately (no
      // skeleton), then refetch in the background and swap in fresh data.
      const loadOverview = useCallback(async () => {
        const cached = lsGet('promptlab_overview');
        if (cached) { setOverview(cached); setLoading(false); setRefreshing(true); }
        else { setLoading(true); }
        setError(null);
        try {
          const data = await api('/api/overview');
          setOverview(data); lsSet('promptlab_overview', data);
        } catch (e) {
          if (e.message === 'unauthorized') { setAuthed(false); return; }
          if (!cached) setError(e.message);  // keep stale data on a refresh error
        }
        setLoading(false); setRefreshing(false);
      }, []);

      useEffect(() => {
        if (authed) {
          loadOverview();
          api('/api/info').then(setInfo).catch(() => {});
        }
      }, [authed]);

      // Prefetch the most-recently-active project so opening it is instant.
      useEffect(() => {
        if (!overview) return;
        const bp = overview.by_project || {};
        const top = Object.keys(bp).sort((a, b) =>
          (bp[b]?.summaries?.[0]?.date || '').localeCompare(bp[a]?.summaries?.[0]?.date || ''))[0];
        if (top && !memo.project.has(top)) {
          api('/api/project?name=' + encodeURIComponent(top))
            .then(d => memo.project.set(top, d)).catch(() => {});
        }
      }, [overview]);

      // Keyboard shortcut: / to open Ask (admin only)
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && role === 'admin') {
            e.preventDefault();
            setAskOpen(true);
          }
          if (e.key === 'Escape') setAskOpen(false);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [role]);

      const logout = async () => {
        await fetch('/api/login', { method: 'DELETE' });
        // Clear caches so a different login never sees the prior user's data.
        memo.project.clear(); memo.cost.clear();
        try { localStorage.removeItem('promptlab_overview'); } catch { /* ignore */ }
        setAuthed(false); setOverview(null);
      };

      if (authed === null) return html`<div class="loading">Loading...</div>`;
      if (!authed) return html`<${Login} onLogin=${(r) => { setAuthed(true); setRole(r || 'admin'); }} />`;

      // Project lists for the top-nav picker: active (recency-sorted) then dormant.
      const bp = overview?.by_project || {};
      const active = Object.keys(bp).sort((a, b) =>
        (bp[b]?.summaries?.[0]?.date || '').localeCompare(bp[a]?.summaries?.[0]?.date || ''));
      const dormant = (overview?.all_projects || []).filter(p => !active.includes(p)).sort();

      return html`
        <div class="container">
          <${Header} route=${route} info=${info} role=${role} onLogout=${logout}
            active=${active} dormant=${dormant} refreshing=${refreshing}
            onAsk=${role === 'admin' ? () => setAskOpen(true) : null} />

          ${loading && !overview && html`<${SkeletonList} />`}
          ${error && html`
            <div class="error">
              <p>${error}</p>
              <button onClick=${loadOverview} style="margin-top: 10px; padding: 6px 14px;
                background: var(--accent); color: white; border: none; border-radius: var(--radius);
                cursor: pointer; font-size: 0.85rem;">Retry</button>
            </div>
          `}

          ${overview && route.view === 'home' && html`
            <${HomeView} overview=${overview} />
          `}
          ${overview && route.view === 'project' && html`
            <${ProjectPage} name=${route.project} overview=${overview} section=${route.section} />
          `}
          ${route.view === 'costs' && html`<${CostsOverview} />`}
          ${route.view === 'visitors' && html`<${VisitorsOverview} />`}
          ${route.view === 'todos' && html`<${TodosView} overview=${overview} />`}

          ${askOpen && html`<${AskModal} overview=${overview} project=${route.view === 'project' ? route.project : null} onClose=${() => setAskOpen(false)} />`}
        </div>
      `;
    }

    // ---- Distill a summary row into a short phrase ----
    function distillPhrase(s) {
      const decisions = tryParseJson(s.key_decisions);
      if (decisions.length > 0) return decisions[0];
      const words = (s.summary || '').split(' ');
      return words.slice(0, 12).join(' ') + (words.length > 12 ? '...' : '');
    }

    // ---- Home: Pulse (metrics-first) over the activity stream ----

    // Inline SVG sparkline from a value series. Returns null-safe markup.
    function Spark({ values, color, w = 96, h = 28 }) {
      if (!values || values.length < 2) return null;
      const max = Math.max(...values, 1);
      const n = values.length;
      const pts = values.map((v, i) =>
        `${(i / (n - 1)) * w},${h - (v / max) * (h - 3) - 1}`);
      const last = pts[pts.length - 1].split(',');
      return html`
        <svg width=${w} height=${h} viewBox=${`0 0 ${w} ${h}`} preserveAspectRatio="none"
             style="display:block; overflow:visible">
          <polyline points=${`0,${h} ${pts.join(' ')} ${w},${h}`}
            fill=${color} opacity="0.1" stroke="none" />
          <polyline points=${pts.join(' ')} fill="none" stroke=${color}
            stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" />
          <circle cx=${last[0]} cy=${last[1]} r="2" fill=${color} />
        </svg>`;
    }

    // Sum activity_by_project into one {date -> prompts} series over a date span.
    function dailySeries(activityByProject, days) {
      const byDate = {};
      for (const p of Object.keys(activityByProject || {})) {
        for (const d of activityByProject[p] || []) {
          byDate[d.date] = (byDate[d.date] || 0) + (d.prompts || 0);
        }
      }
      const out = [];
      for (let i = days - 1; i >= 0; i--) {
        const ds = new Date(Date.now() - i * 86400_000).toISOString().slice(0, 10);
        out.push({ date: ds, n: byDate[ds] || 0 });
      }
      return out;
    }

    // KPI tile row. Numbers we already have (week totals, active count) render
    // instantly; spend + views fill in when their endpoints resolve.
    function PulseTiles({ overview, cost30, views30 }) {
      const week = overview.week || {};
      const activeCount = Object.keys(overview.by_project || {}).length;
      const dormantCount = (overview.all_projects || [])
        .filter(p => !(overview.by_project || {})[p]).length;

      const promptSeries = dailySeries(overview.activity_by_project, 30).map(d => d.n);

      const spend30 = (cost30 || []).reduce((s, r) => s + (Number(r.cost_usd) || 0), 0);
      const spendByDate = {};
      for (const r of (cost30 || [])) spendByDate[r.date] = (spendByDate[r.date] || 0) + (Number(r.cost_usd) || 0);
      const spendSeries = [];
      for (let i = 29; i >= 0; i--) {
        const ds = new Date(Date.now() - i * 86400_000).toISOString().slice(0, 10);
        spendSeries.push(spendByDate[ds] || 0);
      }

      const views30sum = (views30 || []).reduce((s, r) => s + (Number(r.views) || 0), 0);
      const viewsByDate = {};
      for (const r of (views30 || [])) viewsByDate[r.date] = (viewsByDate[r.date] || 0) + (Number(r.views) || 0);
      const viewsSeries = [];
      for (let i = 29; i >= 0; i--) {
        const ds = new Date(Date.now() - i * 86400_000).toISOString().slice(0, 10);
        viewsSeries.push(viewsByDate[ds] || 0);
      }

      const tiles = [
        { label: 'active projects', value: activeCount, sub: dormantCount + ' dormant', to: null },
        { label: 'sessions · 7d', value: (week.sessions || 0).toLocaleString(), to: null },
        { label: 'prompts · 7d', value: (week.prompts || 0).toLocaleString(),
          series: promptSeries, color: 'var(--accent-light)', to: null },
        { label: 'commits · 7d', value: (week.commits || 0).toLocaleString(), to: null },
        { label: 'api spend · 30d', value: cost30 == null ? '…' : fmtUsd(spend30),
          series: cost30 == null ? null : spendSeries, color: 'var(--green)', to: '#/costs' },
        { label: 'page views · 30d',
          value: views30 == null ? '…' : (views30sum ? views30sum.toLocaleString() : 'new'),
          series: views30 == null ? null : viewsSeries, color: '#06b6d4', to: '#/visitors' },
      ];

      return html`
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
                    gap:12px; margin-bottom:22px">
          ${tiles.map(t => {
            const inner = html`
              <div style="display:flex; flex-direction:column; gap:6px; height:100%">
                <div style="font-family:'SF Mono',ui-monospace,monospace; font-size:0.62rem;
                            letter-spacing:0.08em; text-transform:uppercase; color:var(--text-secondary)">
                  ${t.label}
                </div>
                <div style="font-size:1.7rem; font-weight:650; letter-spacing:-0.02em;
                            font-variant-numeric:tabular-nums; line-height:1">${t.value}</div>
                <div style="flex:1"></div>
                ${t.series
                  ? html`<${Spark} values=${t.series} color=${t.color} />`
                  : t.sub
                    ? html`<div style="font-family:'SF Mono',ui-monospace,monospace; font-size:0.62rem;
                                       color:var(--text-secondary)">${t.sub}</div>`
                    : html`<div style="height:28px"></div>`}
              </div>`;
            const style = `background:var(--card); border:1px solid var(--border);
                           border-radius:var(--radius); padding:14px 15px; min-height:104px;
                           text-decoration:none; color:var(--text); display:block;
                           transition:border-color 0.15s, background 0.15s;
                           ${t.to ? 'cursor:pointer' : ''}`;
            return t.to
              ? html`<a href=${t.to} style=${style}
                       onMouseEnter=${e => e.currentTarget.style.borderColor = '#3a3a3a'}
                       onMouseLeave=${e => e.currentTarget.style.borderColor = 'var(--border)'}>${inner}</a>`
              : html`<div style=${style}>${inner}</div>`;
          })}
        </div>`;
    }

    // Cross-project 30-day activity — one stacked bar per day, colored by project.
    function CrossProjectActivity({ overview }) {
      const [hovered, setHovered] = useState(null);
      const act = overview.activity_by_project || {};

      // Rank projects by total prompts; top 8 get colors, rest fold into "other".
      const totals = {};
      for (const p of Object.keys(act))
        totals[p] = (act[p] || []).reduce((s, d) => s + (d.prompts || 0), 0);
      const ranked = Object.entries(totals).sort((a, b) => b[1] - a[1]);
      if (!ranked.length || ranked[0][1] === 0) return null;
      const colorOf = {};
      ranked.forEach(([p], i) => { colorOf[p] = i < COST_PALETTE.length ? COST_PALETTE[i] : COST_OTHER; });
      const namedSet = new Set(ranked.slice(0, COST_PALETTE.length).map(e => e[0]));
      const segColor = p => namedSet.has(p) ? colorOf[p] : COST_OTHER;

      // Per-day, per-project prompt counts + day totals.
      const byDateProject = {};
      for (const p of Object.keys(act))
        for (const d of act[p] || [])
          (byDateProject[d.date] ||= {})[p] = (byDateProject[d.date]?.[p] || 0) + (d.prompts || 0);

      const dates = [];
      for (let i = 29; i >= 0; i--)
        dates.push(new Date(Date.now() - i * 86400_000).toISOString().slice(0, 10));
      const dayTotal = d => Object.values(byDateProject[d] || {}).reduce((s, v) => s + v, 0);
      const peak = Math.max(...dates.map(dayTotal), 1);
      const CHART_H = 120, n = dates.length;
      const tickIdxs = new Set();
      const k = Math.min(6, n);
      for (let i = 0; i < k; i++) tickIdxs.add(Math.round((i * (n - 1)) / (k - 1)));

      return html`
        <div style="margin-bottom:26px; padding:16px; background:var(--card);
                    border:1px solid var(--border); border-radius:var(--radius)">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px">
            <div style="font-family:'SF Mono',ui-monospace,monospace; font-size:0.68rem;
                        letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary)">
              Activity · last 30 days
            </div>
            <div style="font-family:'SF Mono',ui-monospace,monospace; font-size:0.62rem; color:var(--text-secondary)">
              prompts per day, stacked by project
            </div>
          </div>
          <div style="display:flex; gap:2px; align-items:stretch; height:${CHART_H}px;
                      border-bottom:1px solid var(--border)">
            ${dates.map((d, i) => {
              const total = dayTotal(d);
              const barH = total > 0 ? Math.max(1, Math.round((total / peak) * (CHART_H - 4))) : 0;
              const isH = hovered === i;
              const edge = n > 1 ? i / (n - 1) : 0.5;
              const anchor = edge < 0.15 ? 'left:0' : edge > 0.85 ? 'right:0' : 'left:50%; transform:translateX(-50%)';
              const segs = Object.entries(byDateProject[d] || {}).sort((a, b) => b[1] - a[1]);
              return html`
                <div style="flex:1; min-width:3px; height:100%; position:relative; cursor:default"
                     onMouseEnter=${() => setHovered(i)}
                     onMouseLeave=${() => setHovered(h2 => h2 === i ? null : h2)}>
                  <div style="position:absolute; left:0; right:0; bottom:0; height:${barH}px;
                              display:flex; flex-direction:column-reverse; border-radius:2px 2px 0 0;
                              overflow:hidden; opacity:${isH ? 1 : 0.85}; transition:opacity 0.1s">
                    ${segs.map(([p, v]) => html`
                      <div style="height:${(v / total) * 100}%; background:${segColor(p)}"></div>`)}
                  </div>
                  ${isH && total > 0 && html`
                    <div style="position:absolute; bottom:100%; z-index:5; margin-bottom:4px; ${anchor};
                                background:var(--bg); border:1px solid var(--border); border-radius:6px;
                                padding:8px 10px; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.4);
                                font-size:0.7rem">
                      <div style="font-weight:600; margin-bottom:4px">${fmtShortDate(d)} · ${total} prompts</div>
                      ${segs.slice(0, 6).map(([p, v]) => html`
                        <div style="display:flex; align-items:center; gap:6px; color:var(--text-secondary)">
                          <span style="width:8px; height:8px; border-radius:2px; background:${segColor(p)}; display:inline-block"></span>
                          <span style="color:var(--text)">${p}</span>
                          <span style="margin-left:auto">${v}</span>
                        </div>`)}
                      ${segs.length > 6 && html`<div style="color:var(--text-secondary)">+${segs.length - 6} more</div>`}
                    </div>`}
                </div>`;
            })}
          </div>
          <div style="display:flex; gap:2px; margin-top:4px; margin-bottom:12px">
            ${dates.map((d, i) => html`
              <div style="flex:1; min-width:3px; text-align:center; font-size:0.55rem;
                          color:var(--text-secondary); font-family:'SF Mono',ui-monospace,monospace;
                          white-space:nowrap">${tickIdxs.has(i) ? fmtShortDate(d) : ''}</div>`)}
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:10px 16px">
            ${ranked.slice(0, COST_PALETTE.length).map(([p]) => html`
              <a href=${'#/project/' + encodeURIComponent(p)}
                 style="display:inline-flex; align-items:center; gap:6px; text-decoration:none;
                        color:var(--text-secondary); font-size:0.72rem">
                <span style="width:8px; height:8px; border-radius:2px; background:${segColor(p)}"></span>${p}
              </a>`)}
            ${ranked.length > COST_PALETTE.length && html`
              <span style="display:inline-flex; align-items:center; gap:6px; font-size:0.72rem; color:var(--text-secondary)">
                <span style="width:8px; height:8px; border-radius:2px; background:${COST_OTHER}"></span>+${ranked.length - COST_PALETTE.length} more
              </span>`}
          </div>
        </div>`;
    }

    // ---- Home: cross-project activity stream ----
    function HomeView({ overview }) {
      const { week, by_project } = overview;
      const [expanded, setExpanded] = useState({});
      const [showDormant, setShowDormant] = useState(false);
      const [cost30, setCost30] = useState(() => costOverviewMemo.get(30)?.rows || null);
      const [views30, setViews30] = useState(() => visitorOverviewMemo.get(30)?.daily || null);

      useEffect(() => {
        const since = new Date(Date.now() - 30 * 86400_000).toISOString().slice(0, 10);
        api('/api/cost_overview?since=' + since)
          .then(d => { costOverviewMemo.set(30, d); setCost30(d.rows || []); })
          .catch(() => setCost30([]));
        api('/api/visitor_overview?since=' + since)
          .then(d => { visitorOverviewMemo.set(30, d); setViews30(d.daily || []); })
          .catch(() => setViews30([]));
      }, []);
      const toggle = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));

      // Flatten every project's daily summaries into one reverse-chron feed.
      const items = [];
      for (const p of Object.keys(by_project)) {
        for (const s of (by_project[p]?.summaries || [])) {
          items.push({ id: p + '-' + s.date, project: p, date: s.date, data: s,
                       phrase: distillPhrase(s), decisions: tryParseJson(s.key_decisions) });
        }
      }
      items.sort((a, b) => b.date.localeCompare(a.date) || a.project.localeCompare(b.project));

      const activeProjects = new Set(items.map(i => i.project));
      const dormantProjects = (overview.all_projects || [])
        .filter(p => !activeProjects.has(p)).sort();

      // Group by date for the timeline rail.
      const groups = [];
      let cur = null;
      for (const item of items) {
        if (item.date !== cur) { cur = item.date; groups.push({ date: cur, items: [] }); }
        groups[groups.length - 1].items.push(item);
      }

      const open = (p) => navigate('#/project/' + encodeURIComponent(p));

      return html`
        <${PulseTiles} overview=${overview} cost30=${cost30} views30=${views30} />
        <${CrossProjectActivity} overview=${overview} />

        <div class="sec-label" style="font-family:'SF Mono',ui-monospace,monospace; font-size:0.68rem;
             letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary);
             margin:0 0 12px">Recent activity</div>

        ${items.length === 0
          ? html`<div class="empty">No project activity in the last 7 days.</div>`
          : html`
            <div class="timeline">
              ${groups.map(g => html`
                <div class="timeline-date">${g.date}</div>
                ${g.items.map(item => {
                  const isOpen = expanded[item.id];
                  const s = item.data;
                  return html`
                    <div class="timeline-entry" onClick=${() => toggle(item.id)}>
                      <a class="stream-project" onClick=${(e) => { e.stopPropagation(); open(item.project); }}>${item.project}</a>
                      <span class="timeline-phrase" style="margin-left: 6px">${item.phrase}</span>
                      ${isOpen && html`
                        <div class="timeline-expand">
                          <div class="timeline-expand-summary">
                            <${MachineText}>${s.summary}<//>
                          </div>
                          ${item.decisions.length > 0 && html`
                            <ul class="timeline-expand-decisions">
                              ${item.decisions.map(d => html`<li>${d}</li>`)}
                            </ul>
                          `}
                          <div class="timeline-expand-counts">
                            <span><strong>${s.prompt_count || 0}</strong> prompts</span>
                            <span><strong>${s.session_count || 0}</strong> sessions</span>
                            <span><strong>${s.commit_count || 0}</strong> commits</span>
                          </div>
                        </div>
                      `}
                    </div>
                  `;
                })}
              `)}
            </div>
          `}

        ${dormantProjects.length > 0 && html`
          <div style="margin-top: 24px">
            <button style="font-size: 0.85rem; color: var(--text-secondary); background: none;
              border: none; cursor: pointer; font-family: inherit; padding: 6px 0"
              onClick=${() => setShowDormant(!showDormant)}>
              ${showDormant ? 'Hide' : 'Show'} ${dormantProjects.length} dormant project${dormantProjects.length > 1 ? 's' : ''}
            </button>
            ${showDormant && html`
              <div class="dormant-list">
                ${dormantProjects.map(p => html`
                  <span class="dormant-chip" onClick=${() => open(p)}>${p}</span>
                `)}
              </div>
            `}
          </div>
        `}
      `;
    }

    // ---- Activity Heatmap (GitHub-style, up to 12 months) ----
    function ActivityHeatmap({ activity }) {
      if (!activity?.length) return null;

      // Build a date->count map
      const byDate = {};
      for (const a of activity) byDate[a.date] = (a.prompt_count || 0);

      // Generate last 365 days grouped by week
      const today = new Date();
      const weeks = [];
      const monthLabels = [];
      let lastMonth = -1;

      // Start from the most recent Sunday
      const start = new Date(today);
      start.setDate(start.getDate() - 364);
      // Align to Sunday
      start.setDate(start.getDate() - start.getDay());

      let week = [];
      for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const ds = d.toISOString().slice(0, 10);
        const count = byDate[ds] || 0;
        const level = count === 0 ? 0 : count <= 3 ? 1 : count <= 8 ? 2 : count <= 15 ? 3 : 4;
        week.push({ date: ds, level });

        // Track month labels (first week of each month)
        if (d.getMonth() !== lastMonth && d.getDay() === 0) {
          monthLabels.push({ idx: weeks.length, label: d.toLocaleDateString('en', { month: 'short' }) });
          lastMonth = d.getMonth();
        }

        if (d.getDay() === 6 || d.getTime() >= today.getTime()) {
          weeks.push(week);
          week = [];
        }
      }
      if (week.length) weeks.push(week);

      return html`
        <div>
          <div class="heatmap-labels">
            ${monthLabels.map(m => html`<span>${m.label}</span>`)}
          </div>
          <div class="heatmap" style="display: flex; gap: 2px">
            ${weeks.map(w => html`
              <div class="heatmap-month">
                ${w.map(cell => html`
                  <div class="heatmap-cell heatmap-cell-${cell.level}" title="${cell.date}: ${byDate[cell.date] || 0} prompts"></div>
                `)}
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ---- Todos (open GitHub issues across all your repos) ----
    let todosMemo = null;     // by-repo payload
    let todosCatMemo = null;  // categorized payload (by-type)

    // Type-of-work buckets — must mirror web/classify_helper.py's taxonomy.
    const CAT_ORDER = ['bug','feature','infra','ux','content','research','other','uncategorized'];
    const CAT_META = {
      bug:          { label: 'Bugs',            color: '#ef4444' },
      feature:      { label: 'Features',        color: '#6366f1' },
      infra:        { label: 'Infra & tooling', color: '#06b6d4' },
      ux:           { label: 'UX & polish',     color: '#ec4899' },
      content:      { label: 'Content & docs',  color: '#eab308' },
      research:     { label: 'Research',        color: '#a855f7' },
      other:        { label: 'Other',           color: '#777' },
      uncategorized:{ label: 'Uncategorized',   color: '#555' },
    };

    function TodosView({ overview }) {
      const [data, setData] = useState(todosMemo);
      const [loading, setLoading] = useState(!todosMemo);
      const [expanded, setExpanded] = useState({});  // project|cat -> bool
      const [showAll, setShowAll] = useState(false);  // tracked projects only vs every owned repo
      const [query, setQuery] = useState('');
      const [groupBy, setGroupBy] = useState('repo');  // 'repo' | 'type'
      const [catData, setCatData] = useState(todosCatMemo);
      const [catLoading, setCatLoading] = useState(false);

      useEffect(() => {
        if (todosMemo) { setData(todosMemo); setLoading(false); }
        let alive = true;
        api('/api/todos')
          .then(d => { todosMemo = d; if (alive) { setData(d); setLoading(false); } })
          .catch(e => { if (alive && !todosMemo) { setData({ error: e.message }); setLoading(false); } });
        return () => { alive = false; };
      }, []);

      // Lazily fetch the categorized payload the first time "by type" is shown.
      // If the server classified some but stragglers remain (pending>0), poll
      // again to classify the next capped batch until the backlog drains.
      useEffect(() => {
        if (groupBy !== 'type' || catData) return;
        let alive = true;
        setCatLoading(true);
        const load = () => api('/api/todos?categorize=1').then(d => {
          todosCatMemo = d;
          if (!alive) return;
          setCatData(d); setCatLoading(false);
          if (d.pending > 0 && d.classified_now > 0) setTimeout(load, 600);
        }).catch(() => { if (alive) setCatLoading(false); });
        load();
        return () => { alive = false; };
      }, [groupBy]);

      const reclassify = () => {
        setCatLoading(true);
        api('/api/todos?categorize=1&recategorize=1')
          .then(d => { todosCatMemo = d; setCatData(d); setCatLoading(false); })
          .catch(() => setCatLoading(false));
      };

      const header = html`
        <h1 style="margin: 0 0 4px; font-size: 1.4rem">Todos</h1>
        <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 16px">
          Open GitHub issues across your repos, grouped by project.
        </div>`;

      if (loading && !data) return html`<div>${header}<div class="cost-placeholder">Loading todos…</div></div>`;
      if (!data || data.error) return html`<div>${header}<div class="cost-placeholder">Couldn't load todos.${data?.error ? ' (' + data.error + ')' : ''}</div></div>`;
      if (data.configured === false) return html`<div>${header}
        <div class="cost-placeholder">
          GitHub isn't connected. Set a <code>GITHUB_TOKEN</code> (read access to issues)
          in the Vercel project env and redeploy.
        </div></div>`;

      const projects = data.projects || {};
      const allNames = Object.keys(projects).sort((a, b) =>
        projects[b].length - projects[a].length || a.localeCompare(b));
      if (!allNames.length) return html`<div>${header}
        <div class="empty">No open issues. 🎉</div></div>`;

      // Tracked = projects the dashboard knows about (canonical names). The
      // endpoint already folds repo→canonical, so these match. Null until the
      // overview loads, in which case nothing is hidden.
      const tracked = overview
        ? new Set([...(overview.all_projects || []), ...Object.keys(overview.by_project || {})])
        : null;
      const isTracked = (p) => !tracked || tracked.has(p);
      const hiddenNames = allNames.filter(p => !isTracked(p));
      const hiddenRepos = hiddenNames.length;
      const scoped = showAll ? allNames : allNames.filter(isTracked);

      // Search filters issues within the scoped repos by title / label /
      // #number / repo name.
      const q = query.trim().toLowerCase();
      const matches = (iss, p) => !q
        || (iss.title || '').toLowerCase().includes(q)
        || ('#' + iss.number).includes(q)
        || p.toLowerCase().includes(q)
        || (iss.labels || []).some(lb => lb.toLowerCase().includes(q));
      const filtered = scoped
        .map(p => ({ p, issues: projects[p].filter(iss => matches(iss, p)) }))
        .filter(x => x.issues.length > 0);

      const shownTotal = filtered.reduce((s, x) => s + x.issues.length, 0);

      const labelColor = (name) => {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
        return `hsl(${Math.abs(hash) % 360}, 45%, 45%)`;
      };

      // While searching, force every matching repo open so hits are visible.
      const isOpenFor = (p) => q ? true : !!expanded[p];
      const allOpen = filtered.every(x => isOpenFor(x.p));
      const toggleAll = () => {
        const next = {};
        if (!allOpen) filtered.forEach(x => { next[x.p] = true; });
        setExpanded(next);
      };
      const toggle = (p) => setExpanded(e => ({ ...e, [p]: !e[p] }));

      // ---- by-type grouping (from the categorized payload) ----
      const catProjects = (catData && catData.projects) || {};
      const flatCat = [];
      for (const p of Object.keys(catProjects)) {
        if (!showAll && !isTracked(p)) continue;
        for (const iss of catProjects[p]) if (matches(iss, p)) flatCat.push({ iss, p });
      }
      const byCat = {};
      for (const x of flatCat) (byCat[x.iss.category || 'uncategorized'] ||= []).push(x);
      const catList = CAT_ORDER.filter(c => (byCat[c] || []).length).map(c => ({ c, items: byCat[c] }));
      const catTotal = flatCat.length;
      const isCatOpen = (c) => q ? true : (expanded['cat:' + c] ?? true);  // default open
      const catToggle = (c) => setExpanded(e => ({ ...e, ['cat:' + c]: !(e['cat:' + c] ?? true) }));

      const grouper = html`
        <div style="display: flex; gap: 4px; margin-bottom: 12px">
          ${[['repo', 'by project'], ['type', 'by type']].map(([g, lbl]) => html`
            <button onClick=${() => setGroupBy(g)}
              style="font-size: 0.72rem; padding: 4px 12px; border-radius: 999px; cursor: pointer;
                     font-family: inherit; border: 1px solid var(--border);
                     background: ${groupBy === g ? 'var(--accent)' : 'transparent'};
                     color: ${groupBy === g ? '#fff' : 'var(--text-secondary)'}">${lbl}</button>`)}
        </div>`;

      const searchBox = html`
        <input type="text" placeholder="Search issues — title, label, #number, repo"
          value=${query} onInput=${e => setQuery(e.target.value)}
          style="width: 100%; box-sizing: border-box; margin-bottom: 14px; padding: 8px 12px;
                 font-size: 0.85rem; font-family: inherit; color: var(--text);
                 background: var(--card); border: 1px solid var(--border); border-radius: var(--radius)" />`;

      // ---- by type ----
      if (groupBy === 'type') {
        return html`
          <div>
            ${header}
            ${grouper}
            ${searchBox}
            ${catLoading && !catData
              ? html`<div class="cost-placeholder">Classifying issues by type…</div>`
              : html`
                <div style="display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; flex-wrap: wrap">
                  <div style="font-size: 1.6rem; font-weight: 700">${catTotal}</div>
                  <div style="font-size: 0.78rem; color: var(--text-secondary)">
                    ${q ? 'matching' : 'open'} across ${catList.length} categor${catList.length === 1 ? 'y' : 'ies'}${showAll ? '' : ' (tracked)'}
                  </div>
                  <div style="margin-left: auto; display: flex; gap: 12px; align-items: baseline">
                    ${(showAll || hiddenRepos > 0) && html`
                      <button onClick=${() => setShowAll(s => !s)}
                        style="font-size: 0.7rem; color: var(--accent); background: none; border: none;
                               cursor: pointer; font-family: inherit">
                        ${showAll ? 'Tracked only' : `Show all repos (+${hiddenRepos})`}
                      </button>`}
                    <button onClick=${reclassify}
                      style="font-size: 0.7rem; color: var(--text-secondary); background: none; border: none;
                             cursor: pointer; font-family: inherit" title="Re-run the LLM classification for every issue">
                      ↻ reclassify
                    </button>
                  </div>
                </div>

                ${catData && catData.categorized === undefined && html`
                  <div style="font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 12px">
                    Showing cached categories. Sign in as admin to classify new issues.
                  </div>`}

                ${catList.length === 0
                  ? html`<div class="empty">No issues${q ? ' match “' + query + '”' : ''}.</div>`
                  : catList.map(({ c, items }) => {
                    const meta = CAT_META[c] || CAT_META.uncategorized;
                    const open = isCatOpen(c);
                    return html`
                      <div style="border-bottom: 1px solid var(--border)">
                        <div style="display: flex; align-items: center; gap: 8px; padding: 10px 0; cursor: pointer"
                             onClick=${() => catToggle(c)}>
                          <span style="font-size: 0.7rem; color: var(--text-secondary); width: 10px; flex: none">${open ? '▾' : '▸'}</span>
                          <span style="width: 9px; height: 9px; border-radius: 2px; background: ${meta.color}; flex: none"></span>
                          <span style="font-size: 0.95rem; font-weight: 600">${meta.label}</span>
                          <span style="font-size: 0.7rem; color: var(--text-secondary)">${items.length}</span>
                        </div>
                        ${open && html`
                          <div style="padding: 0 0 10px 18px">
                            ${items.map(({ iss, p }) => html`
                              <a href=${iss.url} target="_blank" rel="noopener"
                                 style="display: flex; align-items: baseline; gap: 8px; padding: 6px 0;
                                        text-decoration: none; color: var(--text); border-top: 1px solid var(--border)">
                                <span style="font-size: 0.66rem; color: var(--accent-light); flex: none; min-width: 96px;
                                             overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${p}</span>
                                <span style="font-size: 0.7rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; flex: none">#${iss.number}</span>
                                <span style="font-size: 0.85rem; flex: 1; min-width: 0">${iss.title}</span>
                                <span style="font-size: 0.65rem; color: var(--text-secondary); flex: none">${timeAgo(iss.updated_at)}</span>
                              </a>`)}
                          </div>`}
                      </div>`;
                  })}
              `}
          </div>`;
      }

      // ---- by project (default) ----
      return html`
        <div>
          ${header}
          ${grouper}
          ${searchBox}

          <div style="display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; flex-wrap: wrap">
            <div style="font-size: 1.6rem; font-weight: 700">${shownTotal}</div>
            <div style="font-size: 0.78rem; color: var(--text-secondary)">
              ${q ? 'matching' : 'open'} across ${filtered.length} project${filtered.length === 1 ? '' : 's'}${showAll ? '' : ' (tracked)'}
            </div>
            <div style="margin-left: auto; display: flex; gap: 12px; align-items: baseline">
              ${(showAll || hiddenRepos > 0) && html`
                <button onClick=${() => setShowAll(s => !s)}
                  style="font-size: 0.7rem; color: var(--accent); background: none; border: none;
                         cursor: pointer; font-family: inherit">
                  ${showAll ? 'Tracked only' : `Show all repos (+${hiddenRepos})`}
                </button>`}
              <button onClick=${toggleAll}
                style="font-size: 0.7rem; color: var(--accent); background: none; border: none;
                       cursor: pointer; font-family: inherit">
                ${allOpen ? 'Collapse all' : 'Expand all'}
              </button>
            </div>
          </div>

          ${filtered.length === 0
            ? html`<div class="empty">No issues match “${query}”.</div>`
            : filtered.map(({ p, issues }) => {
            const isOpen = isOpenFor(p);
            return html`
            <div style="border-bottom: 1px solid var(--border)">
              <div style="display: flex; align-items: center; gap: 8px; padding: 10px 0; cursor: pointer"
                   onClick=${() => toggle(p)}>
                <span style="font-size: 0.7rem; color: var(--text-secondary); width: 10px; flex: none">${isOpen ? '▾' : '▸'}</span>
                <span style="font-size: 0.95rem; font-weight: 600">${p}</span>
                <span style="font-size: 0.7rem; color: var(--text-secondary)">${issues.length}${q && issues.length !== projects[p].length ? '/' + projects[p].length : ''}</span>
                ${!isTracked(p) && html`<span style="font-size: 0.58rem; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 0 5px">untracked</span>`}
                <a onClick=${(e) => { e.stopPropagation(); navigate('#/project/' + encodeURIComponent(p)); }}
                   style="margin-left: auto; font-size: 0.66rem; color: var(--accent); cursor: pointer; text-decoration: none">
                  project →
                </a>
              </div>
              ${isOpen && html`
                <div style="padding: 0 0 10px 18px">
                  ${issues.map(iss => html`
                    <a href=${iss.url} target="_blank" rel="noopener"
                       style="display: flex; align-items: baseline; gap: 8px; padding: 6px 0;
                              text-decoration: none; color: var(--text); border-top: 1px solid var(--border)">
                      <span style="font-size: 0.7rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; flex: none">#${iss.number}</span>
                      <span style="font-size: 0.85rem; flex: 1; min-width: 0">${iss.title}</span>
                      ${iss.labels.map(lb => html`
                        <span style="font-size: 0.6rem; padding: 1px 6px; border-radius: 8px; flex: none;
                                     background: ${labelColor(lb)}; color: #fff; white-space: nowrap">${lb}</span>`)}
                      <span style="font-size: 0.65rem; color: var(--text-secondary); flex: none">${timeAgo(iss.updated_at)}</span>
                    </a>`)}
                </div>`}
            </div>`;
          })}
        </div>`;
    }

    // ---- Costs Overview (all projects, over time) ----
    const COST_PALETTE = ['#6366f1','#22c55e','#eab308','#ef4444','#06b6d4',
                          '#ec4899','#f97316','#a855f7'];
    const COST_OTHER = '#555';
    const costOverviewMemo = new Map();  // window(days) -> payload

    function fmtUsd(n) {
      return '$' + (Number(n) || 0).toLocaleString('en-US',
        { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function fmtShortDate(iso) {
      const [, m, d] = iso.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(m, 10) - 1] + ' ' + parseInt(d, 10);
    }

    function CostsOverview() {
      const [days, setDays] = useState(30);
      const [data, setData] = useState(() => costOverviewMemo.get(30) || null);
      const [loading, setLoading] = useState(!costOverviewMemo.has(30));
      const [sortBy, setSortBy] = useState('cost');  // 'cost' | 'name'
      const [hovered, setHovered] = useState(null);   // date index

      useEffect(() => {
        const cached = costOverviewMemo.get(days);
        if (cached) { setData(cached); setLoading(false); }
        else { setData(null); setLoading(true); }
        const since = new Date(Date.now() - days * 86400_000)
          .toISOString().slice(0, 10);
        let alive = true;
        api('/api/cost_overview?since=' + since)
          .then(d => { costOverviewMemo.set(days, d); if (alive) { setData(d); setLoading(false); } })
          .catch(e => { if (alive && !cached) { setData({ error: e.message }); setLoading(false); } });
        return () => { alive = false; };
      }, [days]);

      const windowPicker = html`
        <div style="display: flex; gap: 4px">
          ${[30, 90, 365].map(d => html`
            <button onClick=${() => setDays(d)}
              style="font-size: 0.72rem; padding: 4px 10px; border-radius: 4px;
                     cursor: pointer; font-family: inherit;
                     border: 1px solid var(--border);
                     background: ${days === d ? 'var(--accent)' : 'transparent'};
                     color: ${days === d ? '#fff' : 'var(--text-secondary)'}">
              ${d === 365 ? '1y' : d + 'd'}
            </button>`)}
        </div>`;

      const header = html`
        <div style="display: flex; justify-content: space-between; align-items: baseline;
                    flex-wrap: wrap; gap: 12px; margin-bottom: 4px">
          <h1 style="margin: 0; font-size: 1.4rem">Costs</h1>
          ${windowPicker}
        </div>
        <div style="font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 20px">
          API spend across all projects. Claude Code (subscription) usage isn't
          attributable per project, so subscription-only projects read $0 here —
          these totals are API spend, not all spend.
        </div>`;

      if (loading && !data) return html`<div>${header}<div class="cost-placeholder">Loading costs…</div></div>`;
      if (!data || data.error) return html`<div>${header}<div class="cost-placeholder">Couldn't load costs.</div></div>`;

      const rows = data.rows || [];
      if (!rows.length) return html`<div>${header}
        <div class="cost-placeholder">No API spend in this window.</div></div>`;

      // Aggregate.
      const byProject = {}, byModel = {}, byDate = {}, byDateProject = {};
      for (const r of rows) {
        const v = Number(r.cost_usd) || 0;
        byProject[r.project] = (byProject[r.project] || 0) + v;
        byModel[r.model] = (byModel[r.model] || 0) + v;
        byDate[r.date] = (byDate[r.date] || 0) + v;
        (byDateProject[r.date] ||= {})[r.project] =
          (byDateProject[r.date]?.[r.project] || 0) + v;
      }
      const total = Object.values(byProject).reduce((s, v) => s + v, 0);

      // Rank projects by spend; top 8 get colors, the rest fold into "other".
      const ranked = Object.entries(byProject).sort((a, b) => b[1] - a[1]);
      const colorOf = {};
      ranked.forEach(([p], i) => { colorOf[p] = i < COST_PALETTE.length ? COST_PALETTE[i] : COST_OTHER; });
      const namedProjects = ranked.slice(0, COST_PALETTE.length).map(e => e[0]);
      const namedSet = new Set(namedProjects);
      const hasOther = ranked.length > COST_PALETTE.length;
      const segColor = (p) => namedSet.has(p) ? colorOf[p] : COST_OTHER;

      // Continuous calendar axis: one bar per day in the window (zero-filled),
      // so a window with only a few spend-days still renders thin, evenly-spaced
      // bars instead of two giant ones.
      const dates = [];
      for (let i = days - 1; i >= 0; i--) {
        dates.push(new Date(Date.now() - i * 86400_000).toISOString().slice(0, 10));
      }
      const peak = Math.max(...Object.values(byDate), 0.0001);
      const CHART_H = 140;
      const n = dates.length;
      const tickIdxs = new Set();
      if (n > 0) { const k = Math.min(6, n); for (let i = 0; i < k; i++) tickIdxs.add(Math.round((i * (n - 1)) / (k - 1))); }

      // Legend rows (sortable).
      const legend = [...ranked];
      if (sortBy === 'name') legend.sort((a, b) => a[0].localeCompare(b[0]));

      const models = Object.entries(byModel).sort((a, b) => b[1] - a[1]);

      const panel = (children) => html`
        <div style="margin-top: 16px; padding: 14px; background: var(--bg-elevated, var(--card));
                    border: 1px solid var(--border); border-radius: 6px">${children}</div>`;

      return html`
        <div>
          ${header}

          <div style="display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px">
            <div style="font-size: 1.6rem; font-weight: 700">${fmtUsd(total)}</div>
            <div style="font-size: 0.78rem; color: var(--text-secondary)">
              total · last ${days === 365 ? 'year' : days + ' days'}
            </div>
          </div>

          ${panel(html`
            <div style="display: grid; grid-template-columns: 56px 1fr; gap: 8px">
              <div style="display: flex; flex-direction: column; justify-content: space-between;
                          align-items: flex-end; height: ${CHART_H}px; font-size: 0.62rem;
                          color: var(--text-secondary); font-family: 'SF Mono', ui-monospace, monospace">
                <span>${fmtUsd(peak)}</span>
                <span>${fmtUsd(peak / 2)}</span>
                <span>$0</span>
              </div>
              <div>
                <div style="display: flex; gap: 2px; align-items: stretch; height: ${CHART_H}px;
                            border-bottom: 1px solid var(--border)">
                  ${dates.map((d, i) => {
                    const dayTotal = byDate[d] || 0;
                    const barH = dayTotal > 0 ? Math.max(1, Math.round((dayTotal / peak) * (CHART_H - 4))) : 0;
                    const isHovered = hovered === i;
                    const edge = n > 1 ? i / (n - 1) : 0.5;
                    const tipAnchor = edge < 0.15 ? 'left' : edge > 0.85 ? 'right' : 'center';
                    // Stack segments within the bar, biggest project at the bottom.
                    const segs = Object.entries(byDateProject[d] || {}).sort((a, b) => b[1] - a[1]);
                    return html`
                      <div style="flex: 1; min-width: 3px; height: 100%; position: relative; cursor: default"
                           onMouseEnter=${() => setHovered(i)}
                           onMouseLeave=${() => setHovered(h2 => h2 === i ? null : h2)}>
                        <div style="position: absolute; left: 0; right: 0; bottom: 0; height: ${barH}px;
                                    display: flex; flex-direction: column-reverse;
                                    border-radius: 2px 2px 0 0; overflow: hidden;
                                    opacity: ${isHovered ? 1 : 0.85}; transition: opacity 0.1s">
                          ${segs.map(([p, v]) => html`
                            <div style="height: ${(v / dayTotal) * 100}%; background: ${segColor(p)}"></div>`)}
                        </div>
                        ${isHovered && dayTotal > 0 && html`
                          <div style="position: absolute; bottom: 100%; z-index: 5; margin-bottom: 4px;
                                      ${tipAnchor === 'left' ? 'left: 0' : tipAnchor === 'right' ? 'right: 0' : 'left: 50%; transform: translateX(-50%)'};
                                      background: var(--bg); border: 1px solid var(--border);
                                      border-radius: 6px; padding: 8px 10px; white-space: nowrap;
                                      box-shadow: 0 4px 16px rgba(0,0,0,0.4); font-size: 0.7rem">
                            <div style="font-weight: 600; margin-bottom: 4px">${fmtShortDate(d)} · ${fmtUsd(dayTotal)}</div>
                            ${segs.slice(0, 6).map(([p, v]) => html`
                              <div style="display: flex; align-items: center; gap: 6px; color: var(--text-secondary)">
                                <span style="width: 8px; height: 8px; border-radius: 2px; background: ${segColor(p)}; display: inline-block"></span>
                                <span style="color: var(--text)">${p}</span>
                                <span style="margin-left: auto">${fmtUsd(v)}</span>
                              </div>`)}
                            ${segs.length > 6 && html`<div style="color: var(--text-secondary)">+${segs.length - 6} more</div>`}
                          </div>`}
                      </div>`;
                  })}
                </div>
                <div style="display: flex; gap: 2px; margin-top: 4px">
                  ${dates.map((d, i) => html`
                    <div style="flex: 1; min-width: 3px; text-align: center; font-size: 0.55rem;
                                color: var(--text-secondary); font-family: 'SF Mono', ui-monospace, monospace;
                                overflow: visible; white-space: nowrap">
                      ${tickIdxs.has(i) ? fmtShortDate(d) : ''}
                    </div>`)}
                </div>
              </div>
            </div>
          `)}

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px">
            <div>
              <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px">
                <div style="font-size: 0.72rem; font-weight: 600; color: var(--text-secondary);
                            font-family: 'SF Mono', ui-monospace, monospace; text-transform: uppercase">
                  By project
                </div>
                <button onClick=${() => setSortBy(s => s === 'cost' ? 'name' : 'cost')}
                  style="font-size: 0.66rem; color: var(--accent); background: none; border: none;
                         cursor: pointer; font-family: inherit">
                  sort: ${sortBy} ↕
                </button>
              </div>
              ${legend.map(([p, v]) => html`
                <a href="#/project/${encodeURIComponent(p)}/cost"
                   style="display: flex; align-items: center; gap: 8px; padding: 5px 0;
                          text-decoration: none; color: var(--text); border-bottom: 1px solid var(--border)">
                  <span style="width: 9px; height: 9px; border-radius: 2px; background: ${segColor(p)}; flex: none"></span>
                  <span style="font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${p}</span>
                  <span style="margin-left: auto; font-size: 0.62rem; color: var(--text-secondary)">${(v / total * 100).toFixed(0)}%</span>
                  <span style="font-size: 0.82rem; font-variant-numeric: tabular-nums; min-width: 64px; text-align: right">${fmtUsd(v)}</span>
                </a>`)}
              ${hasOther && html`
                <div style="font-size: 0.62rem; color: var(--text-secondary); padding-top: 6px">
                  ${ranked.length - COST_PALETTE.length} smaller projects share the “other” color.
                </div>`}
            </div>

            <div>
              <div style="font-size: 0.72rem; font-weight: 600; color: var(--text-secondary);
                          font-family: 'SF Mono', ui-monospace, monospace; text-transform: uppercase; margin-bottom: 8px">
                By model
              </div>
              ${models.map(([m, v]) => html`
                <div style="display: flex; align-items: center; gap: 8px; padding: 5px 0;
                            border-bottom: 1px solid var(--border)">
                  <span style="font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${m}</span>
                  <span style="margin-left: auto; font-size: 0.62rem; color: var(--text-secondary)">${(v / total * 100).toFixed(0)}%</span>
                  <span style="font-size: 0.82rem; font-variant-numeric: tabular-nums; min-width: 64px; text-align: right">${fmtUsd(v)}</span>
                </div>`)}
            </div>
          </div>
        </div>`;
    }

    // ---- Visitors Overview (all sites, page views over time) ----
    const visitorOverviewMemo = new Map();  // window(days) -> payload

    function VisitorsOverview() {
      const [days, setDays] = useState(30);
      const [data, setData] = useState(() => visitorOverviewMemo.get(30) || null);
      const [loading, setLoading] = useState(!visitorOverviewMemo.has(30));
      const [hovered, setHovered] = useState(null);

      useEffect(() => {
        const cached = visitorOverviewMemo.get(days);
        if (cached) { setData(cached); setLoading(false); }
